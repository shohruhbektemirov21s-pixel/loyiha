[tool.pytest.ini_options]
# ─── Discovery ────────────────────────────────────────────────────────────────
# Include detector/tests so the detector adapter-contract suite runs in CI. It
# was previously orphaned: testpaths=["tests"] meant `pytest` (and the CI step)
# never collected detector/tests/, so that suite was silently never run.
testpaths     = ["tests", "detector/tests"]
python_files  = ["test_*.py"]
python_classes= ["Test*"]
python_functions = ["test_*"]

# ─── Asyncio ──────────────────────────────────────────────────────────────────
asyncio_mode  = "auto"

# ─── Output ───────────────────────────────────────────────────────────────────
addopts = [
    "--tb=short",
    "--strict-markers",
    "-ra",               # show summary of all non-passing tests
    "--color=yes",
]

# ─── Markers ──────────────────────────────────────────────────────────────────
# Every marker must be declared here — pytest.ini_options with strict-markers
# means an undeclared marker is an error.
markers = [
    # Test tier markers
    "unit:         Pure unit tests, no I/O (fast, always run in CI)",
    "integration:  Tests against the FastAPI app (stub ML seams, no GPU)",
    "model:        Detector/VLM metric and regression tests (may need GPU)",
    "security:     Security and safety invariant tests",
    "performance:  Latency/throughput SLA gate tests",
    "e2e:          Playwright browser tests (require running console + API)",

    # Capability markers (automatically skip when condition not met)
    "requires_real_detector: Tests that require XRAY_DETECTOR_ENABLED=true",
    "requires_real_vlm:      Tests that require XRAY_VLM_ENABLED=true",
    "requires_db:            Tests that require XRAY_TEST_DB_URL to be set",
    "requires_e2e:           Tests that require XRAY_E2E_ENABLED=true",
    "slow:                   Tests that take > 30 seconds",
]

# ─── Coverage (run with --cov) ─────────────────────────────────────────────────
[tool.coverage.run]
source   = ["app", "contracts", "detector", "vlm", "datalayer", "acquisition"]
omit     = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/migrations/*",
    "*/_smoke*",
    # Operational glue / entrypoints exercised by deploy scripts, not the unit
    # suite — counting them would dilute the gate into meaninglessness:
    "app/db/migrate.py",       # run by deploy/start.sh, not pytest
    "*/cli.py",                # CLI entrypoints (camera/cli.py, …)
    "detector/train/*",        # training scripts (need GPU + datasets)
    "detector/eval/*",         # offline eval scripts
    "detector/data/*",
    "detector/autolabel.py",
    "detector/collect_stream.py",
    "vlm/finetune/*",          # finetuning scripts (need GPU)
    "vlm/_smoke_live.py",
]
branch   = true

[tool.coverage.report]
show_missing  = true
skip_covered  = false
# Global floor for a full-source run (includes detector/vlm, partially GPU-gated).
# The per-job HARD gate on the safety-critical app+contracts packages is 80%,
# enforced in CI via `--cov-fail-under=80 --cov=app --cov=contracts` (see
# .github/workflows/ci.yml unit-tests job). detector/vlm are measured in their
# own jobs where the real model runs.
fail_under    = 70          # minimum branch coverage on a full-source run

[tool.coverage.html]
directory = "htmlcov"


# ─── Ruff (linting) ──────────────────────────────────────────────────────────
[tool.ruff]
line-length    = 100
target-version = "py311"

# Linter rules live under [tool.ruff.lint] (top-level select/ignore are deprecated
# in ruff >= 0.6 and emit a warning; CI pins ruff>=0.5 so keep this future-proof).
[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "S",   # flake8-bandit (security)
]
ignore = [
    "S101",   # use of assert — fine in tests
    "S311",   # random — we use secrets where it matters
    "B008",   # FastAPI Depends() in function defaults
]

[tool.ruff.lint.per-file-ignores]
# Test code: asserts (S101) and unused imports for fixtures (F401) are expected;
# B017 (assert raises Exception) and B023 (loop var in closure) are common, safe
# test idioms; C408/E501/F541/F811/F841/E401 are cosmetic in throwaway harness
# code (deliberately-unused `resp`/`req` bindings document intent, long fixture
# literals, inline `import datetime` in builders). The security-critical S-rules
# stay enforced on production code (app/, contracts/, detector/serving, …).
"tests/**"          = ["S", "F401", "B017", "B023", "F841", "F811", "E501", "E401", "C408", "F541"]
"detector/tests/**" = ["S", "F401", "F841", "F811", "E501", "E401", "C408", "F541"]
