# pg_hba.conf — deny-by-default; only named users/hosts allowed.
# TYPE  DATABASE    USER         ADDRESS           METHOD

# Local UNIX socket: admin only
local   all         xray_admin                     scram-sha-256
local   all         all                            reject

# API container (db-net subnet 172.20.1.0/28) — SSL required
hostssl xray_ops    xray_api     172.20.1.0/28     scram-sha-256

# Admin access from db-net only (for migrations)
hostssl all         xray_admin   172.20.1.0/28     scram-sha-256

# Reject everything else
host    all         all          0.0.0.0/0         reject
host    all         all          ::/0              reject
