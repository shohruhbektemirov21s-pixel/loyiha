# nginx — reverse proxy and TLS termination for the operator console.
# Principles:
#   - TLS 1.2 minimum, TLS 1.3 preferred; SSLv3/TLS 1.0/1.1 disabled
#   - All HTTP redirects to HTTPS
#   - Security headers on every response
#   - /metrics, /admin, /v1/* behind auth header pass-through (JWT validated by API)
#   - /grafana only accessible from localhost subnet (monitoring operator)
#   - No server_tokens (version disclosure)
#   - Connection limiting to prevent operator-side DoS on LAN

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ut=$upstream_response_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ── Security ─────────────────────────────────────────────────────────────
    server_tokens off;
    more_clear_headers Server;

    # Connection rate limit: 30 req/min per IP (LAN)
    limit_req_zone $binary_remote_addr zone=console:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/tls/server.crt;
    ssl_certificate_key /etc/nginx/tls/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;         # disable for forward secrecy
    ssl_stapling        off;         # no OCSP — air-gapped
    ssl_stapling_verify off;

    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 8;
    }

    upstream console_backend {
        server console:80;
        keepalive 4;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 4;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        limit_conn conn 20;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header X-Frame-Options            "DENY"                               always;
        add_header X-XSS-Protection           "1; mode=block"                      always;
        add_header Referrer-Policy            "no-referrer"                        always;
        add_header Content-Security-Policy
          "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'none';"
          always;
        add_header Permissions-Policy
          "camera=(), microphone=(), geolocation=(), payment=()"
          always;

        # Max request body (scan images up to 200 MiB)
        client_max_body_size 210m;

        # ── Operator console (React SPA) ──────────────────────────────────────
        location / {
            limit_req zone=console burst=20 nodelay;
            proxy_pass         http://console_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;

            # Cache static assets aggressively; don't cache index.html
            location ~* \.(js|css|woff2?|png|ico|svg)$ {
                proxy_pass http://console_backend;
                proxy_cache_valid 200 7d;
                add_header Cache-Control "public, max-age=604800, immutable";
            }
        }

        # ── API ───────────────────────────────────────────────────────────────
        location /v1/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass         http://api_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";
            proxy_http_version 1.1;
            proxy_read_timeout 120s;   # VLM can be slow
            proxy_send_timeout 30s;
        }

        # ── WebSocket (real-time notifications) ──────────────────────────────
        location /v1/ws {
            proxy_pass             http://api_backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       X-Real-IP  $remote_addr;
            proxy_read_timeout     3600s;    # keep WS alive for 1 hour
            proxy_send_timeout     30s;
        }

        # ── Health (no auth — for monitoring from LAN) ────────────────────────
        location /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }

        # ── Grafana (restricted to monitoring subnet) ─────────────────────────
        location /grafana/ {
            # Restrict to monitoring team subnet — adjust CIDR
            allow  192.168.10.0/24;
            deny   all;

            proxy_pass         http://grafana_backend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Block access to internal paths ────────────────────────────────────
        location ~ ^/(metrics|admin|debug|docs|redoc|openapi\.json) {
            # Prometheus /metrics: block from operator network (internal only)
            deny all;
            return 404;
        }
    }
}
