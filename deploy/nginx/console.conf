# Internal nginx config for the console container (serves React static files).
# Handles SPA routing: all unknown paths → index.html.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset files — long cache
    location ~* \.(js|css|woff2?|png|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health check endpoint for Docker healthcheck
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
