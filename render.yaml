# ============================================================
# X-ray Assistant — Render Blueprint (render.yaml)
# ============================================================
# This blueprint deploys:
#   1. Managed PostgreSQL database (xray-db)
#   2. FastAPI Python API backend (xray-backend)
#   3. React Vite Static operator console (xray-console)
# ============================================================

databases:
  - name: xray-db
    databaseName: xray
    user: kali
    plan: free

services:
  # ── FastAPI Backend Web Service ───────────────────────────
  - type: web
    name: xray-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x deploy/render_start.sh && ./deploy/render_start.sh
    plan: free
    envVars:
      - key: XRAY_ENVIRONMENT
        value: prod
      - key: XRAY_HOST
        value: 0.0.0.0
      - key: XRAY_PORT
        value: 10000
      - key: XRAY_ENABLE_DOCS
        value: "true"
      - key: XRAY_AUTH_BYPASS
        value: "false"

      # Database connection (mapped to asyncpg)
      - key: XRAY_DB_URL
        value: postgresql+asyncpg://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}/${DATABASE_NAME}

      # VLM / Vast.ai GPU config
      - key: XRAY_VLM_ENABLED
        value: "true"
      - key: XRAY_VLM_BACKEND
        value: ollama
      - key: XRAY_VLM_BASE_URL
        value: http://127.0.0.1:11434
      - key: XRAY_VLM_MODEL
        value: qwen3-vl:8b
      - key: XRAY_VLM_NAME
        value: qwen3-vl
      - key: XRAY_VLM_VERSION
        value: 8b
      - key: XRAY_VLM_VERIFY
        value: "false"
      - key: XRAY_VLM_DESCRIBE
        value: "true"

      # CORS (allow all or configure to console url)
      - key: XRAY_CORS_ALLOW_ORIGINS
        value: '["*"]'

      # JWT and Audit secrets (auto-generated)
      - key: XRAY_JWT_SECRET
        generateValue: true
      - key: XRAY_AUDIT_HMAC_KEY
        generateValue: true

      # Vast.ai SSH Tunnel Settings (Set SSH_PRIVATE_KEY in dashboard)
      - key: VAST_SSH_HOST
        value: ssh5.vast.ai
      - key: VAST_SSH_PORT
        value: "38056"
      - key: SSH_PRIVATE_KEY
        sync: false

      # Initial Admin credentials (Set ADMIN_PASSWORD in dashboard)
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false

  # ── React Vite Static Operator Console ────────────────────
  - type: web
    name: xray-console
    runtime: static
    buildCommand: cd console && npm install && npm run build
    staticPublishPath: console/dist
    envVars:
      - key: VITE_AUTH_BYPASS
        value: "false"
      - key: VITE_MOCK
        value: "false"
      - key: VITE_API_URL
        value: https://xray-backend.onrender.com
