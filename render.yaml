# ============================================================
# X-ray Assistant — Render Blueprint (render.yaml)
# ============================================================
# This blueprint deploys:
#   1. Managed PostgreSQL database (xray-db)
#   2. FastAPI Python API backend (xray-backend)
#   3. React Vite Static operator console (xray-console)
# ============================================================

databases:
  - name: xray-db
    databaseName: xray
    user: kali
    plan: free

services:
  # ── FastAPI Backend Web Service ───────────────────────────
  - type: web
    name: xray-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x deploy/render_start.sh && ./deploy/render_start.sh
    plan: free
    envVars:
      # PROD rejimi: auth majburiy. settings.py boot'da tekshiradi —
      # prod + auth_bypass birga bo'lsa server umuman ko'tarilmaydi.
      # Kirish uchun Render dashboard'da ADMIN_PASSWORD o'rnatilgan bo'lishi SHART
      # (render_start.sh birinchi boot'da admin foydalanuvchini yaratadi).
      - key: XRAY_ENVIRONMENT
        value: prod
      - key: XRAY_HOST
        value: 0.0.0.0
      - key: XRAY_PORT
        value: 10000
      # Ochiq internetdagi prod'da OpenAPI docs yopiq (kerak bo'lsa "true" qiling).
      - key: XRAY_ENABLE_DOCS
        value: "false"
      - key: XRAY_AUTH_BYPASS
        value: "false"

      # Database connection. Render injects the real DSN from the xray-db
      # database below; ${...} shell interpolation is NOT expanded in a
      # blueprint `value:`, which is why the old literal DSN failed DNS
      # resolution. The app rewrites the postgresql:// scheme to
      # postgresql+asyncpg:// at startup (app/db/session.py).
      - key: XRAY_DB_URL
        fromDatabase:
          name: xray-db
          property: connectionString

      # VLM / Vast.ai GPU config
      - key: XRAY_VLM_ENABLED
        value: "true"
      - key: XRAY_VLM_BACKEND
        value: ollama
      - key: XRAY_VLM_BASE_URL
        value: http://127.0.0.1:11434
      - key: XRAY_VLM_MODEL
        value: qwen3-vl:8b
      - key: XRAY_VLM_NAME
        value: qwen3-vl
      - key: XRAY_VLM_VERSION
        value: 8b
      - key: XRAY_VLM_VERIFY
        value: "false"
      - key: XRAY_VLM_DESCRIBE
        value: "true"

      # CORS: wildcard EMAS — faqat alohida static konsolning aniq origin'i.
      # Backend o'zi ham konsolni same-origin ko'rsatadi (CORS talab qilmaydi);
      # bu faqat xray-console static sayti uchun. fromService real (suffikslangan)
      # hostni beradi; app https:// bilan o'zi qo'shadi (app/settings.py).
      - key: XRAY_CORS_CONSOLE_HOST
        fromService:
          type: web
          name: xray-console
          property: host

      # JWT and Audit secrets (auto-generated)
      - key: XRAY_JWT_SECRET
        generateValue: true
      - key: XRAY_AUDIT_HMAC_KEY
        generateValue: true

      # Vast.ai GPU auto-start + SSH Tunnel
      - key: VAST_API_KEY
        sync: false
      - key: VAST_INSTANCE_ID
        value: "43598057"
      - key: VAST_SSH_HOST
        value: ssh5.vast.ai
      - key: VAST_SSH_PORT
        value: "38056"
      - key: SSH_PRIVATE_KEY
        sync: false

      # Initial Admin credentials (Set ADMIN_PASSWORD in dashboard)
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false

  # ── React Vite Static Operator Console ────────────────────
  - type: web
    name: xray-console
    runtime: static
    buildCommand: cd console && npm install && npm run build
    staticPublishPath: console/dist
    envVars:
      - key: VITE_AUTH_BYPASS
        value: "false"
      - key: VITE_MOCK
        value: "false"
      # Backend URL is wired automatically from the xray-backend service's real
      # host. The literal `xray-backend.onrender.com` subdomain is GLOBALLY
      # taken by another Render account, so our backend actually gets a
      # suffixed host (e.g. xray-backend-xxxx.onrender.com). fromService resolves
      # that real host at build time — no hardcoding, no collision.
      # Value is a bare host (no scheme); the frontend prepends https/wss.
      - key: VITE_API_URL
        value: https://xray-backend-1ki1.onrender.com
